<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Robot QR Scanner</title>
    <style>
      body {
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        font-family: "Orbitron", sans-serif;
        color: #00ffea;
      }

      .robot {
        width: 300px;
        height: 180px;
        background: #111;
        border-radius: 40px;
        position: relative;
        box-shadow: 0 0 20px #00ffea inset, 0 0 30px #00ffea;
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 20px;
      }

      .eye {
        width: 60px;
        height: 30px;
        background: #00ffea;
        border-radius: 50%;
        animation: blink 4s infinite, float 3s ease-in-out infinite;
        box-shadow: 0 0 15px #00ffea;
      }

      .eye.right {
        width: 70px;
        height: 40px;
        border-radius: 60% 60% 40% 40%;
      }

      @keyframes blink {
        0%,
        90%,
        100% {
          transform: scaleY(1);
        }
        95% {
          transform: scaleY(0.1);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-5px);
        }
      }

      #status {
        margin-top: 20px;
        font-size: 20px;
        text-shadow: 0 0 8px #00ffea;
        min-height: 30px;
      }

      .recent-scans {
        margin-top: 30px;
        width: 320px;
        background: rgba(0, 255, 234, 0.05);
        border: 1px solid rgba(0, 255, 234, 0.2);
        border-radius: 12px;
        padding: 15px;
        max-height: 200px;
        overflow-y: auto;
      }

      .recent-scans h3 {
        margin: 0 0 10px 0;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: rgba(0, 255, 234, 0.6);
      }

      .scan-item {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid rgba(0, 255, 234, 0.1);
        font-size: 0.9rem;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }

      .admin-link, .video-toggle {
        position: fixed;
        bottom: 20px;
        color: #00ffea;
        text-decoration: none;
        font-size: 0.8rem;
        opacity: 0.5;
        transition: all 0.2s;
        border: 1px solid #00ffea;
        padding: 5px 10px;
        border-radius: 5px;
        background: transparent;
        font-family: inherit;
        cursor: pointer;
      }

      .admin-link { right: 20px; }
      .video-toggle { left: 20px; }

      .admin-link:hover, .video-toggle:hover {
        opacity: 1;
        background: rgba(0, 255, 234, 0.1);
        box-shadow: 0 0 10px rgba(0, 255, 234, 0.2);
      }

      #video {
        width: 100%;
        max-width: 400px;
        height: auto;
        border: 2px solid rgba(0, 255, 234, 0.3);
        border-radius: 20px;
        margin: 20px 0;
        box-shadow: 0 0 15px rgba(0, 255, 234, 0.2);
        display: none;
      }

      #canvas {
        display: none; /* Hide duplicate canvas used for processing */
      }
    </style>
  </head>
  <body>
    <div class="robot">
      <div class="eye left"></div>
      <div class="eye right"></div>
    </div>

    <div id="status">🤖 Initializing Scanner...</div>

    <div class="recent-scans" id="recent-scans-container" style="display: none;">
      <h3>Recent Scans</h3>
      <div id="recent-scans-list"></div>
    </div>

    <a href="/admin" class="admin-link">Admin Dashboard</a>
    <button id="toggle-video" class="video-toggle">Show Video</button>

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <!-- jsQR library -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const statusDiv = document.getElementById("status");
      const context = canvas.getContext("2d");
      const toggleBtn = document.getElementById("toggle-video");

      toggleBtn.onclick = () => {
        if (video.style.display === "none" || video.style.display === "") {
          video.style.display = "block";
          toggleBtn.innerText = "Hide Video";
        } else {
          video.style.display = "none";
          toggleBtn.innerText = "Show Video";
        }
      };

      let lastDetected = ""; // prevent duplicate calls
      let lastScanTime = 0;
      const SCAN_INTERVAL = 500; // ms between scans
      let cooldown = false;

      function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-IN";
        utterance.rate = 1;
        speechSynthesis.speak(utterance);
      }

      navigator.mediaDevices
        .getUserMedia({ video: { facingMode: "environment" } })
        .then((stream) => {
          video.srcObject = stream;
          statusDiv.innerText = "🤖 Scanner Ready - Show QR";
          requestAnimationFrame(scanFrame);
        })
        .catch((err) => {
          statusDiv.innerText = "Camera access denied!";
          speak("Camera access denied");
        });

      function scanFrame(timestamp) {
        if (video.readyState === video.HAVE_ENOUGH_DATA && !cooldown) {
          if (timestamp - lastScanTime > SCAN_INTERVAL) {
            lastScanTime = timestamp;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imageData = context.getImageData(
              0,
              0,
              canvas.width,
              canvas.height
            );
            const code = jsQR(
              imageData.data,
              imageData.width,
              imageData.height
            );

            if (code) {
              if (code.data !== lastDetected) {
                lastDetected = code.data;
                statusDiv.innerText = "📡 QR Detected: Sending...";
                sendToServer(code.data);

                // Start cooldown (3 seconds) to avoid repeated scans
                cooldown = true;
                setTimeout(() => {
                  cooldown = false;
                }, 3000);
              }
            } else {
              statusDiv.innerText = "🔍 Scanning...";
            }
          }
        }
        requestAnimationFrame(scanFrame);
      }

      const scansList = document.getElementById("recent-scans-list");
      const scansContainer = document.getElementById("recent-scans-container");
      const recentScans = [];

      function addRecentScan(qrData) {
        let name = "Unknown";
        try {
          if (qrData.startsWith("{")) {
            name = JSON.parse(qrData).name;
          } else {
            name = qrData.split(",")[1];
          }
        } catch (e) {
          console.error("Error parsing name:", e);
        }

        recentScans.unshift({ name, time: new Date().toLocaleTimeString() });
        if (recentScans.length > 5) recentScans.pop();

        scansContainer.style.display = "block";
        scansList.innerHTML = recentScans
          .map(
            (s) => `
          <div class="scan-item">
            <span>${s.name}</span>
            <span style="color: rgba(0,255,234,0.5)">${s.time}</span>
          </div>
        `
          )
          .join("");
      }

      async function sendToServer(qrData) {
        try {
          const response = await fetch("/mark-attendance", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ qr_data: qrData }),
          });

          const result = await response.json();
          const msg = result.status;

          if (msg === "success") {
            statusDiv.innerText = "✅ Attendance Marked!";
            speak("Attendance marked successfully");
            addRecentScan(qrData);
          } else if (msg === "marked") {
            statusDiv.innerText = "⚠️ Already Marked Today!";
            speak("You have already marked attendance today");
            addRecentScan(qrData); // Still show in recent if they just tried
          } else {
            statusDiv.innerText = "❌ Error: " + msg;
            speak("Error marking attendance");
          }
        } catch (err) {
          statusDiv.innerText = "❌ Server Error";
          speak("Error connecting to server");
          // redirect after 2s
          setTimeout(() => {
            window.location.href = "/";
          }, 2000);
        }
      }
    </script>
  </body>
</html>
