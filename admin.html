<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nephele Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffea;
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 255, 234, 0.3);
            margin-bottom: 30px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 234, 0.1);
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input[type="date"] {
            background: #252525;
            border: 1px solid #333;
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
        }

        button {
            background: var(--primary);
            color: black;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 15px var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid #333;
        }

        th {
            background: rgba(0, 255, 234, 0.05);
            color: var(--primary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            background: rgba(0, 255, 234, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
        }
    </style>
</head>
<body>
    <h1>NEPHELE ADMIN DASHBOARD</h1>
    
    <div class="container">
        <div class="controls">
            <div>
                <label for="date-filter">Filter by Date: </label>
                <input type="date" id="date-filter">
                <button onclick="fetchAttendance()">Filter</button>
                <span id="status-indicator" style="margin-left: 10px; font-size: 0.8rem; color: var(--primary); opacity: 0.7;"></span>
            </div>
            <button onclick="exportCSV()">Export CSV</button>
        </div>

        <table id="attendance-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Dept</th>
                    <th>Date</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody id="attendance-body">
                <!-- Data will be injected here -->
            </tbody>
        </table>
    </div>

    <script>
        async function fetchAttendance() {
            const statusIndicator = document.getElementById('status-indicator');
            if (statusIndicator) statusIndicator.innerText = "Loading...";

            const dateFilter = document.getElementById('date-filter').value;
            let url = '/attendance';
            if (dateFilter) {
                url += `?date_filter=${dateFilter}`;
            }

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                renderTable(data);
                if (statusIndicator) statusIndicator.innerText = "";
            } catch (error) {
                console.error('Error fetching attendance:', error);
                alert("Failed to fetch records. Make sure you are accessing this page via http://127.0.0.1:8000/admin and NOT opening the file directly.");
                if (statusIndicator) statusIndicator.innerText = "Error loading records.";
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('attendance-body');
            tbody.innerHTML = '';

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: #666;">No records found.</td></tr>';
                return;
            }

            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.id}</td>
                    <td>${row.roll_no}</td>
                    <td>${row.name}</td>
                    <td>${row.dept}</td>
                    <td>${row.date}</td>
                    <td>${row.timestamp}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function exportCSV() {
            const table = document.getElementById('attendance-table');
            let csv = [];
            for (let i = 0; i < table.rows.length; i++) {
                let row = [], cols = table.rows[i].querySelectorAll('td, th');
                for (let j = 0; j < cols.length; j++) 
                    row.push('"' + cols[j].innerText + '"');
                csv.push(row.join(','));
            }
            const csvContent = "data:text/csv;charset=utf-8," + csv.join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "attendance_report.csv");
            document.body.appendChild(link);
            link.click();
        }

        // Initial fetch
        fetchAttendance();
    </script>
</body>
</html>
