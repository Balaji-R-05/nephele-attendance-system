<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Robot QR Scanner</title>
  <style>
    body {
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      font-family: 'Orbitron', sans-serif;
      color: #00ffea;
    }

    .robot {
      width: 300px;
      height: 180px;
      background: #111;
      border-radius: 40px;
      position: relative;
      box-shadow: 0 0 20px #00ffea inset, 0 0 30px #00ffea;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 20px;
    }

    .eye {
      width: 60px;
      height: 30px;
      background: #00ffea;
      border-radius: 50%;
      animation: blink 4s infinite, float 3s ease-in-out infinite;
      box-shadow: 0 0 15px #00ffea;
    }

    .eye.right {
      width: 70px;
      height: 40px;
      border-radius: 60% 60% 40% 40%;
    }

    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    #status {
      margin-top: 20px;
      font-size: 20px;
      text-shadow: 0 0 8px #00ffea;
    }

    video, canvas { display: none; } /* hide camera feed */
  </style>
</head>
<body>
  <div class="robot">
    <div class="eye left"></div>
    <div class="eye right"></div>
  </div>

  <div id="status">🤖 Initializing Scanner...</div>

  <video id="video" autoplay></video>
  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');

    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-IN";
      utterance.rate = 1;
      speechSynthesis.speak(utterance);
    }

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
        statusDiv.innerText = "🤖 Scanner Ready - Show QR";
        startScanning();
      })
      .catch(err => {
        statusDiv.innerText = "Camera access denied!";
        speak("Camera access denied");
      });

    function startScanning() {
      setInterval(() => {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(async (blob) => {
          const formData = new FormData();
          formData.append("file", blob, "capture.png");

          try {
            const response = await fetch("http://127.0.0.1:8000/mark-attendance", {
              method: "POST",
              body: formData
            });

            const result = await response.json();
            const msg = result.status;

            if (msg === "success") {
              statusDiv.innerText = "✅ Attendance Marked!";
              speak("Attendance marked successfully");
            } else if (msg === "marked") {
              statusDiv.innerText = "⚠️ Already Marked Today!";
              speak("You have already marked attendance today");
            } else if (msg === "qr not found") {
              statusDiv.innerText = "🔍 Scanning...";
            }

          } catch (err) {
            statusDiv.innerText = "❌ Server Error";
            // speak("Error connecting to server");
          }
        }, "image/png");
      }, 2000);
    }
  </script>
</body>
</html>
